name: Release

# Runs only after the CI workflow completes successfully on main, so a release
# never happens unless lint, typecheck, unit tests, e2e, and builds have passed.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # push version commits/tags
  pull-requests: write # open the "Version Packages" PR
  id-token: write # npm trusted publishing (OIDC)

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships an older npm.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # With changesets present -> opens/updates the "Version Packages" PR.
      # With none remaining (that PR merged) -> runs the publish script.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: bash scripts/release.sh
          commit: "chore: version packages"
          title: "chore: version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
