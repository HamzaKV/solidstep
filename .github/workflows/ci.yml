name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck & unit tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & format check
        run: pnpm exec biome ci .

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests & coverage
        run: pnpm run test:coverage

      - name: Build framework
        run: pnpm --filter solidstep build

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Report-only. This monorepo's prod tree includes the example app (via
      # vinxi) and build tooling, whose deep transitive advisories are upstream
      # and are NOT shipped by the `solidstep` package. Gating on the root audit
      # would wedge every PR on issues this repo can't fix; Dependabot owns the
      # actual remediation (dependency bumps). This step keeps advisories visible
      # in the CI logs without blocking. Review the output for anything in
      # solidstep's own direct deps.
      - name: Audit production dependencies (report-only)
        run: pnpm audit --audit-level=high --prod || true

  e2e:
    name: E2E (kitchen-sink)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # kitchen-sink consumes the framework via `link:../../packages/solidstep/dist`,
      # so the framework must be built before the example app.
      - name: Build framework
        run: pnpm --filter solidstep build

      - name: Build example app
        run: pnpm --filter kitchen-sink build

      - name: Install Playwright browsers
        run: pnpm --filter kitchen-sink exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter kitchen-sink exec playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: examples/kitchen-sink/playwright-report/
          retention-days: 7
